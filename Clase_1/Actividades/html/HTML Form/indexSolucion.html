<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de inscripción</title>
</head>
<body>

    <h1>Inscripción</h1>

    <form action="#" method="post">

        <label for="nombre">Nombre completo:</label>
        <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            required>

        <br><br>

        <label for="email">Correo electrónico:</label>
        <input 
            type="email" 
            id="email" 
            name="email" 
            required>

        <br><br>

        <label for="edad">Edad:</label>
        <input 
            type="number" 
            id="edad" 
            name="edad" 
            min="1"
            required>

        <br><br>

        <button type="submit">Enviar</button>

    </form>

</body>
</html>
